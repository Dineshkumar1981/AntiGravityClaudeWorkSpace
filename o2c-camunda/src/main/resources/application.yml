spring:
  application:
    name: o2c-platform
  datasource:
    url: jdbc:h2:mem:o2cdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
      firstName: O2C Admin
    filter:
      create: All Tasks
    database:
      schema-update: true
    webapp:
      application-path: /camunda
    job-execution:
      enabled: true

server:
  port: 8080

logging:
  level:
    uk.telecom.o2c: DEBUG
    org.camunda: WARN
